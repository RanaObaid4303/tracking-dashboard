<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time GPS Tracker</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f2f5;
            color: #1a1a1a;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        /* Live Device Panel */
        #panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 300px;
            max-height: 80vh;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            padding: 20px;
            z-index: 5;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h2 {
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .refresh-time {
            font-weight: normal;
            font-size: 0.75rem;
            color: #666;
        }

        .device-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 8px;
        }

        .device-item:hover {
            background: #f8f9fa;
        }

        .device-id {
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .device-info {
            font-size: 0.8rem;
            color: #555;
            display: flex;
            justify-content: space-between;
        }

        .badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .badge-gps { background: #e6f4ea; color: #1e8e3e; }
        .badge-network { background: #fef7e0; color: #f9ab00; }

        /* Custom Marker InfoWindow */
        .info-window {
            padding: 10px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div id="panel">
        <h2>
            Live Devices
            <span id="last-refresh" class="refresh-time">Refreshing...</span>
        </h2>
        <div id="device-list">
            <!-- Devices will appear here -->
        </div>
    </div>

    <div id="map"></div>

    <!-- Replace YOUR_API_KEY with your actual Google Maps API Key -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDRJvMizB7mDDb3mzdLsZb3UY8wI1VPu7o&callback=initMap" async defer></script>

    <script>
        let map;
        let markers = {}; // device_id -> google.maps.Marker
        const BACKEND_URL = "https://obaid4303.pythonanywhere.com";

        function initMap() {
            // Karachi Coordinates
            const karachi = { lat: 24.8607, lng: 67.0011 };
            
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 12,
                center: karachi,
                mapId: "fb54b8a927a3c3c", // Optional: Custom Vector Map ID
                disableDefaultUI: false,
                zoomControl: true,
                streetViewControl: false
            });

            // Start polling for data
            fetchLocations();
            setInterval(fetchLocations, 5000);
        }

        async function fetchLocations() {
            try {
                const response = await fetch(`${BACKEND_URL}/get-all-locations`);
                const devices = await response.json();
                
                updateMarkers(devices);
                updateDeviceList(devices);
                
                document.getElementById("last-refresh").innerText = 
                    "Updated: " + new Date().toLocaleTimeString();
            } catch (error) {
                console.error("Error fetching locations:", error);
                document.getElementById("last-refresh").innerText = "Connection Error";
            }
        }

        function updateMarkers(devices) {
            devices.forEach(device => {
                const pos = { lat: parseFloat(device.lat), lng: parseFloat(device.lon) };
                const isGps = device.mode === "gps";
                
                // Color configuration
                const markerColor = isGps ? "#1E8E3E" : "#F9AB00"; // Green for GPS, Orange for Network

                if (markers[device.device_id]) {
                    // Update existing marker
                    markers[device.device_id].setPosition(pos);
                    markers[device.device_id].setIcon(getMarkerIcon(markerColor));
                    // Update label in case device_id somehow changes
                    markers[device.device_id].setLabel(getMarkerLabel(device.device_id));
                } else {
                    // Create new marker
                    const marker = new google.maps.Marker({
                        position: pos,
                        map: map,
                        title: device.device_id,
                        icon: getMarkerIcon(markerColor),
                        label: getMarkerLabel(device.device_id),
                        animation: google.maps.Animation.DROP
                    });

                    const infoWindow = new google.maps.InfoWindow({
                        content: `
                            <div class="info-window">
                                <strong>Device:</strong> ${device.device_id}<br>
                                <strong>Mode:</strong> ${device.mode.toUpperCase()}<br>
                                <strong>Time:</strong> ${device.timestamp}
                            </div>
                        `
                    });

                    marker.addListener("click", () => {
                        infoWindow.open(map, marker);
                    });

                    markers[device.device_id] = marker;
                }
            });
        }

        function getMarkerIcon(color) {
            return {
                path: google.maps.SymbolPath.CIRCLE,
                fillColor: color,
                fillOpacity: 1,
                strokeWeight: 2,
                strokeColor: "#FFFFFF",
                scale: 18, // Increased scale to make space for the label
                labelOrigin: new google.maps.Point(0, 0)
            };
        }

        function getMarkerLabel(text) {
            return {
                text: text,
                color: "#FFFFFF",
                fontSize: "10px",
                fontWeight: "bold"
            };
        }

        function updateDeviceList(devices) {
            const listContainer = document.getElementById("device-list");
            listContainer.innerHTML = "";

            if (devices.length === 0) {
                listContainer.innerHTML = "<p style='font-size:0.8rem;color:#777'>No active devices</p>";
                return;
            }

            devices.forEach(device => {
                const item = document.createElement("div");
                item.className = "device-item";
                
                const badgeClass = device.mode === "gps" ? "badge-gps" : "badge-network";
                const timeStr = device.timestamp.split('T')[1].split('.')[0]; // Quick extract time

                item.innerHTML = `
                    <div class="device-id">${device.device_id}</div>
                    <div class="device-info">
                        <span class="badge ${badgeClass}">${device.mode}</span>
                        <span>${timeStr}</span>
                    </div>
                `;

                item.onclick = () => {
                    map.panTo({ lat: parseFloat(device.lat), lng: parseFloat(device.lon) });
                    map.setZoom(15);
                    google.maps.event.trigger(markers[device.device_id], 'click');
                };

                listContainer.appendChild(item);
            });
        }
    </script>
</body>
</html>
